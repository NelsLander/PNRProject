function urgency(dl){
  const d=dl-Date.now();
  if(d<0) return "overdue";
  if(d<86400000) return "urgent";
  if(d<172800000) return "close";
  return "fine";
}
function fmtTime(ts,noTime){
  if(noTime) return null;
  const d=new Date(ts); let h=d.getHours(),m=d.getMinutes(),ap=h>=12?"pm":"am";
  h=h%12||12; return `${h}:${String(m).padStart(2,"0")}${ap}`;
}
function fmtCountdown(dl){
  const diff=dl-Date.now(),abs=Math.abs(diff);
  const h=Math.floor(abs/3600000),m=Math.floor((abs%3600000)/60000),d=Math.floor(h/24);
  const sfx=diff<0?" overdue":" left";
  return d>0?`${d}d ${h%24}h${sfx}`:`${h}h ${m}m${sfx}`;
}
function urgencyColor(u){
  return u==="overdue"?"#ff3b3b":u==="urgent"?"#ff9500":u==="close"?"#ffd60a":null;
}
function ordinal(n){const s=["th","st","nd","rd"],v=n%100;return(s[(v-20)%10]||s[v]||s[0]);}

function repeatLabel(r){
  if(!r) return null;
  if(r.type==="daily") return "Daily";
  if(r.type==="weekly") return "Weekly · "+r.days.map(d=>DAY_NAMES[d].slice(0,3)).join(", ");
  if(r.type==="monthly") return `Monthly · ${r.day}${ordinal(r.day)}`;
  return null;
}

function expandRepeating(task, winStart, winEnd){
  if(!task.repeat) return [];
  const results=[];
  const baseTime=new Date(task.deadline);
  const hh=baseTime.getHours(),mm=baseTime.getMinutes();
  let cursor=new Date(winStart instanceof Date?winStart:new Date(winStart));
  cursor.setHours(0,0,0,0);
  cursor=addDays(cursor,-1);
  const limit=new Date(winEnd instanceof Date?winEnd:new Date(winEnd));
  limit.setDate(limit.getDate()+1);
  let safety=0;
  while(cursor<=limit&&safety<200){
    safety++;
    let match=false;
    if(task.repeat.type==="daily") match=true;
    else if(task.repeat.type==="weekly") match=task.repeat.days.includes((cursor.getDay()+6)%7);
    else if(task.repeat.type==="monthly") match=cursor.getDate()===task.repeat.day;
    if(match){
      const dl=new Date(cursor); dl.setHours(hh,mm,0,0);
      // include the start date itself (use startOf day comparison)
      const dlDay=new Date(dl); dlDay.setHours(0,0,0,0);
      const baseDay=new Date(task.deadline); baseDay.setHours(0,0,0,0);
      if(dlDay.getTime()>=baseDay.getTime()){
        const skipped=(task.skipped||[]);
        if(!skipped.includes(dl.getTime())){
          results.push({...task,id:`${task.id}_${dl.getTime()}`,deadline:dl.getTime(),_repeatParentId:task.id,_isRepeat:true});
        }
      }
    }
    cursor=addDays(cursor,1);
  }
  return results;
}

// Count how many occurrences of a repeating task have passed since its start
function countOccurrencesSince(task, since){
  if(!task.repeat) return 0;
  const winEnd=new Date();
  const expanded=expandRepeating(task, new Date(since||task.deadline), winEnd);
  return expanded.filter(t=>t.deadline<=Date.now()).length;
}

function Flash({msg,color,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2000);return()=>clearTimeout(t);},[]);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300}}>
      <div style={{background:color,borderRadius:20,padding:"28px 36px",textAlign:"center",maxWidth:280,animation:"popIn .2s ease-out"}}>
        <div style={{fontSize:44,marginBottom:6}}>✓</div>
        <div style={{fontSize:18,fontWeight:900,color:"#000"}}>{msg}</div>
      </div>
    </div>
  );
}

// ── RESCHEDULE MODAL ──────────────────────────────────────────────────────────
function RescheduleModal({task,onReschedule,onClose}){
  const cur=new Date(task.deadline);
  const [dateStr,setDateStr]=useState(cur.toISOString().slice(0,10));
  const [timeStr,setTimeStr]=useState(`${String(cur.getHours()).padStart(2,"0")}:${String(cur.getMinutes()).padStart(2,"0")}`);
  const submit=()=>{
    const dl=new Date(`${dateStr}T${timeStr}`).getTime();
    if(isNaN(dl)) return;
    onReschedule(task.id,dl);
    onClose();
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:250,padding:16}} onClick={onClose}>
      <div style={{background:"#161616",border:"1.5px solid #444",borderRadius:16,padding:22,width:"100%",maxWidth:340}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:16,fontWeight:800,color:"#f0f0f0",marginBottom:6}}>Move task</div>
        <div style={{fontSize:13,color:"#666",marginBottom:18,fontStyle:"italic",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{task.title}</div>
        <div style={{display:"flex",gap:10,marginBottom:18}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"#555",fontFamily:"monospace",marginBottom:6}}>Date</div>
            <input type="date" value={dateStr} onChange={e=>setDateStr(e.target.value)}
              style={{width:"100%",background:"#222",border:"1px solid #444",borderRadius:8,padding:"8px 10px",color:"#f0f0f0",fontSize:14,outline:"none",boxSizing:"border-box",colorScheme:"dark"}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:11,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"#555",fontFamily:"monospace",marginBottom:6}}>Time</div>
            <input type="time" value={timeStr} onChange={e=>setTimeStr(e.target.value)}
              style={{width:"100%",background:"#222",border:"1px solid #444",borderRadius:8,padding:"8px 10px",color:"#f0f0f0",fontSize:14,outline:"none",boxSizing:"border-box",colorScheme:"dark"}}/>
          </div>
        </div>
        <button onClick={submit} style={{width:"100%",background:"#f0f0f0",color:"#000",border:"none",borderRadius:9,padding:"12px",fontWeight:800,fontSize:15,cursor:"pointer"}}>Move it</button>
      </div>
    </div>
  );
}

  const cat=cats[task.category]||{label:task.category,emoji:"•",color:"#888"};
  const u=urgency(task.deadline);
  const bc=urgencyColor(u)||cat.color;
  const rl=repeatLabel(task.repeat);
  const t=fmtTime(task.deadline,task.noTime);
  if(showReschedule) return <RescheduleModal task={task} onReschedule={onReschedule} onClose={()=>{setShowReschedule(false);onClose();}}/>;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20}} onClick={onClose}>
      <div style={{background:"#161616",border:`1.5px solid ${bc}`,borderRadius:16,padding:24,width:"100%",maxWidth:360}} onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
          <span>{cat.emoji}</span>
          <span style={{fontSize:11,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:cat.color,fontFamily:"monospace"}}>{cat.label}</span>
          <span style={{marginLeft:"auto",fontSize:11,fontFamily:"monospace",fontWeight:700,color:urgencyColor(u)||"#888"}}>{fmtCountdown(task.deadline)}</span>
        </div>
        <div style={{fontSize:18,fontWeight:800,color:"#f0f0f0",marginBottom:5}}>{task.title}</div>
        <div style={{fontSize:12,color:"#555",fontFamily:"monospace",marginBottom:4}}>
          Due {new Date(task.deadline).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}{t?` at ${t}`:""}
        </div>
        {rl&&<div style={{fontSize:11,color:"#666",fontFamily:"monospace",marginBottom:4}}>🔁 {rl}</div>}
        <div style={{fontSize:12,color:u==="overdue"?"#ff6b6b":"#555",fontStyle:"italic",marginBottom:18}}>{u==="overdue"?pick(HYPE.overdue):u==="urgent"?pick(HYPE.urgent):pick(HYPE.fine)}</div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <button onClick={()=>onComplete(task.id)} style={{flex:1,background:cat.color,color:"#000",border:"none",borderRadius:8,padding:"10px",fontWeight:800,fontSize:14,cursor:"pointer",minWidth:80}}>Done</button>
          <button onClick={()=>setShowReschedule(true)} style={{background:"transparent",color:"#aaa",border:"1px solid #444",borderRadius:8,padding:"10px 12px",fontSize:13,cursor:"pointer"}}>📅 Move</button>
          {task.repeat
            ?<div style={{display:"flex",gap:6,flex:1}}>
               <button onClick={()=>{onDelete(task.id);onClose();}} style={{flex:1,background:"transparent",color:"#555",border:"1px solid #333",borderRadius:8,padding:"8px 6px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Remove all</button>
               <button onClick={()=>{onSkipOne(task.id);onClose();}} style={{flex:1,background:"transparent",color:"#555",border:"1px solid #333",borderRadius:8,padding:"8px 6px",fontSize:11,fontWeight:700,cursor:"pointer"}}>Skip this one</button>
             </div>
            :<button onClick={()=>{onDelete(task.id);onClose();}} style={{background:"transparent",color:"#555",border:"1px solid #333",borderRadius:8,padding:"10px 12px",fontSize:13,cursor:"pointer"}}>Remove</button>
          }
        </div>
      </div>
    </div>
  );
}

// ── REPEAT PICKER ─────────────────────────────────────────────────────────────
function RepeatPicker({value,onChange}){
  const [type,setType]=useState(value?value.type:"none");
  const [days,setDays]=useState(value&&value.type==="weekly"?value.days:[]);
  const [monthDay,setMonthDay]=useState(value&&value.type==="monthly"?value.day:1);
  const emit=(t,d,md)=>{
    if(t==="none"){onChange(null);return;}
    if(t==="daily"){onChange({type:"daily"});return;}
    if(t==="weekly"){onChange(d.length?{type:"weekly",days:d}:null);return;}
    if(t==="monthly"){onChange({type:"monthly",day:md});return;}
  };
  const toggleDay=d=>{const nd=days.includes(d)?days.filter(x=>x!==d):[...days,d].sort((a,b)=>a-b);setDays(nd);emit("weekly",nd,monthDay);};
  const handleType=t=>{setType(t);emit(t,days,monthDay);};
  const handleMonthDay=v=>{const n=parseInt(v);setMonthDay(n);emit("monthly",days,n);};
  return(
    <div>
      <div style={{fontSize:11,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",color:"#555",fontFamily:"monospace",marginBottom:7}}>Repeat</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
        {["none","daily","weekly","monthly"].map(t=>(
          <button key={t} onClick={()=>handleType(t)} style={{background:type===t?"#f0f0f0":"#222",color:type===t?"#000":"#777",border:`1.5px solid ${type===t?"#f0f0f0":"#333"}`,borderRadius:20,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer",textTransform:"capitalize"}}>{t==="none"?"No repeat":t}</button>
        ))}
      </div>
      {type==="weekly"&&(
        <div style={{display:"flex",gap:6,marginBottom:6}}>
          {DAY_NAMES.map((d,i)=>(
            <button key={i} onClick={()=>toggleDay(i)} style={{flex:1,background:days.includes(i)?"#4466ff":"#222",color:days.includes(i)?"#fff":"#555",border:`1.5px solid ${days.includes(i)?"#4466ff":"#333"}`,borderRadius:6,padding:"5px 2px",fontSize:11,fontWeight:700,cursor:"pointer"}}>{d.slice(0,1)}</button>
          ))}
        </div>
      )}
      {type==="monthly"&&(
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:12,color:"#666"}}>Every month on the</span>
          <select value={monthDay} onChange={e=>handleMonthDay(e.target.value)}
            style={{background:"#222",border:"1px solid #444",borderRadius:7,padding:"6px 10px",color:"#f0f0f0",fontSize:14,outline:"none",colorScheme:"dark"}}>
            {Array.from({length:31},(_,i)=>i+1).map(n=><option key={n} value={n}>{n}{ordinal(n)}</option>)}
          </select>
        </div>
      )}
    </div>
  );
}

// ── ADD MODAL ─────────────────────────────────────────────────────────────────

// ── CATEGORY MANAGER ──────────────────────────────────────────────────────────
function SettingsTab({cats,setCats,tasks,completionLog,doneCount}){
  const [showCatMgr,setShowCatMgr]=useState(false);
  const [importErr,setImportErr]=useState(null);

  const exportData=()=>{
    const data={cats,tasks,completionLog,doneCount,exportedAt:Date.now()};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`calendar-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData=()=>{
    const input=document.createElement("input");
    input.type="file";
    input.accept=".json";
    input.onchange=e=>{
      const file=e.target.files[0];
      if(!file) return;
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const data=JSON.parse(ev.target.result);
          if(!data.tasks||!data.cats) throw new Error("Invalid backup file");
          try{localStorage.setItem("p-cats",JSON.stringify(data.cats));}catch{}
          try{localStorage.setItem("p-tasks",JSON.stringify(data.tasks));}catch{}
          try{localStorage.setItem("p-log",JSON.stringify(data.completionLog||[]));}catch{}
          try{localStorage.setItem("p-done",String(data.doneCount||0));}catch{}
          setImportErr(null);
          setTimeout(()=>window.location.reload(),300);
        }catch(err){
          setImportErr("Couldn't read that file. Make sure it's a valid backup.");
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const s=(bg,extra={})=>({background:bg,border:"1px solid #2a2a2a",borderRadius:10,padding:"14px 16px",marginBottom:10,cursor:"pointer",width:"100%",textAlign:"left",color:"#f0f0f0",...extra});

  return(
    <div style={{maxWidth:560,margin:"0 auto",padding:"20px 16px"}}>
      <div style={{fontSize:13,fontWeight:800,color:"#555",letterSpacing:".08em",textTransform:"uppercase",marginBottom:12}}>Categories</div>
      <button onClick={()=>setShowCatMgr(true)} style={s("#111")}>
        <div style={{fontWeight:700,fontSize:14}}>⚙️ Manage Categories</div>
        <div style={{fontSize:12,color:"#555",marginTop:3}}>Edit names, emoji, and colors</div>
      </button>

      <div style={{fontSize:13,fontWeight:800,color:"#555",letterSpacing:".08em",textTransform:"uppercase",margin:"20px 0 12px"}}>Data</div>
      <button onClick={exportData} style={s("#111")}>
        <div style={{fontWeight:700,fontSize:14}}>⬇️ Export Backup</div>
        <div style={{fontSize:12,color:"#555",marginTop:3}}>Download your tasks and categories as a JSON file</div>
      </button>
      <button onClick={importData} style={s("#111")}>
        <div style={{fontWeight:700,fontSize:14}}>⬆️ Import Backup</div>
        <div style={{fontSize:12,color:"#555",marginTop:3}}>Restore from a previously exported file — overwrites current data</div>
      </button>
      {importErr&&<div style={{color:"#ff6b6b",fontSize:12,marginTop:4,padding:"8px 12px",background:"#1a0a0a",borderRadius:8}}>{importErr}</div>}

      <div style={{fontSize:13,fontWeight:800,color:"#555",letterSpacing:".08em",textTransform:"uppercase",margin:"20px 0 12px"}}>About</div>
      <div style={{background:"#111",border:"1px solid #2a2a2a",borderRadius:10,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontWeight:700,fontSize:14}}>Kaizen Calendar</div>
          <div style={{fontFamily:"monospace",fontSize:11,color:"#4ECDC4",fontWeight:700}}>{VERSION}</div>
        </div>
        <div style={{fontSize:12,color:"#555",marginTop:6}}>Tasks done: <span style={{color:"#4ECDC4",fontWeight:700}}>{doneCount}</span></div>
      </div>

      {showCatMgr&&<CatManager cats={cats} onChange={setCats} onClose={()=>setShowCatMgr(false)}/>}
    </div>
  );
}

function CatManager({cats,onChange,onClose}){
  const [local,setLocal]=useState(()=>Object.entries(cats).map(([id,v])=>({id,...v})));
  const [editing,setEditing]=useState(null);
  const [newLabel,setNewLabel]=useState("");
  const [newEmoji,setNewEmoji]=useState(null);
  const [newColor,setNewColor]=useState(null);
  const newEmojiRef=React.useRef(null);
  const newColorRef=React.useRef(null);
  const handleNewEmoji=em=>{newEmojiRef.current=em;setNewEmoji(em);};
  const handleNewColor=col=>{newColorRef.current=col;setNewColor(col);};
  const save=()=>{const out={};local.forEach(c=>{out[c.id]={label:c.label,emoji:c.emoji,color:c.color};});onChange(out);onClose();};
  const addCat=()=>{
    if(!newLabel.trim()) return;
    const id=newLabel.toLowerCase().replace(/\s+/g,"_")+Date.now();
    const newEntry={id,label:newLabel.trim(),emoji:newEmojiRef.current,color:newColorRef.current};
    const updated=[...local,newEntry];
    setLocal(updated);
    // Save immediately so the category persists even without hitting Save
    const out={};updated.forEach(c=>{out[c.id]={label:c.label,emoji:c.emoji,color:c.color};});
    onChange(out);
    setNewLabel("");setNewEmoji(null);setNewColor(null);newEmojiRef.current=null;newColorRef.current=null;
  };
  const remove=id=>{
    const updated=local.filter(c=>c.id!==id);
    setLocal(updated);
    const out={};updated.forEach(c=>{out[c.id]={label:c.label,emoji:c.emoji,color:c.color};});
    onChange(out);
  };
  const update=(id,key,val)=>{
    const updated=local.map(c=>c.id===id?{...c,[key]:val}:c);
    setLocal(updated);
    const out={};updated.forEach(c=>{out[c.id]={label:c.label,emoji:c.emoji,color:c.color};});
    onChange(out);
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",overflowY:"auto",zIndex:250,padding:"16px",WebkitOverflowScrolling:"touch"}} onClick={onClose}>
      <div style={{background:"#161616",border:"1.5px solid #333",borderRadius:16,padding:22,width:"100%",maxWidth:400,margin:"20px auto 100px"}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:16,fontWeight:800,color:"#f0f0f0",marginBottom:18}}>Manage Categories</div>
        {local.map((c,i)=>(
          <div key={c.id} style={{background:"#111",border:`1.5px solid ${c.color}33`,borderRadius:10,padding:"10px 12px",marginBottom:8}}>
            {editing===i?(
              <div>
                <input value={c.label} onChange={e=>update(c.id,"label",e.target.value)}
                  style={{width:"100%",background:"#222",border:"1px solid #444",borderRadius:7,padding:"7px 10px",color:"#f0f0f0",fontSize:14,marginBottom:8,boxSizing:"border-box",outline:"none"}}/>
                <div style={{marginBottom:8}}>
                  <div style={{fontSize:11,color:"#555",fontFamily:"monospace",marginBottom:5}}>EMOJI</div>
                  <EmojiPicker value={c.emoji} onChange={em=>update(c.id,"emoji",em)}/>
                </div>
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:11,color:"#555",fontFamily:"monospace",marginBottom:5}}>COLOR</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {PRESET_COLORS.map(col=><button key={col} onClick={()=>update(c.id,"color",col)} style={{width:24,height:24,borderRadius:"50%",background:col,border:c.color===col?"2px solid #fff":"2px solid transparent",cursor:"pointer"}}/>)}
                  </div>
                </div>
                <button onClick={()=>setEditing(null)} style={{background:c.color,color:"#000",border:"none",borderRadius:7,padding:"6px 14px",fontWeight:800,fontSize:13,cursor:"pointer"}}>Done</button>
              </div>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:18}}>{c.emoji}</span>
                <span style={{fontWeight:700,color:c.color,fontSize:14,flex:1}}>{c.label}</span>
                <button onClick={()=>setEditing(i)} style={{background:"transparent",border:"1px solid #333",borderRadius:6,padding:"4px 10px",color:"#777",fontSize:12,cursor:"pointer"}}>Edit</button>
                <button onClick={()=>remove(c.id)} style={{background:"transparent",border:"1px solid #2a2a2a",borderRadius:6,padding:"4px 8px",color:"#444",fontSize:12,cursor:"pointer"}}>✕</button>
              </div>
            )}
          </div>
        ))}
        <div style={{background:"#0e0e0e",border:"1.5px dashed #2a2a2a",borderRadius:10,padding:"12px",marginTop:12,marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:"#555",fontFamily:"monospace",letterSpacing:".06em",marginBottom:8}}>NEW CATEGORY</div>
          <input placeholder="Name" value={newLabel} onChange={e=>setNewLabel(e.target.value)}
            style={{width:"100%",background:"#1a1a1a",border:"1px solid #333",borderRadius:7,padding:"7px 10px",color:"#f0f0f0",fontSize:14,marginBottom:8,boxSizing:"border-box",outline:"none"}}/>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:11,color:"#444",fontFamily:"monospace",marginBottom:5}}>EMOJI</div>
            <EmojiPicker value={newEmoji} onChange={handleNewEmoji}/>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:11,color:"#444",fontFamily:"monospace",marginBottom:5}}>COLOR</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {PRESET_COLORS.map(col=><button key={col} onClick={()=>handleNewColor(col)} style={{width:24,height:24,borderRadius:"50%",background:col,border:newColor===col?"2px solid #fff":"2px solid transparent",cursor:"pointer"}}/>)}
            </div>
          </div>
          <button onClick={e=>{e.stopPropagation();addCat();}} disabled={!newLabel.trim()||!newEmoji||!newColor} style={{background:newColor||"#333",color:newColor?"#000":"#555",border:"none",borderRadius:7,padding:"7px 16px",fontWeight:800,fontSize:13,cursor:(!newLabel.trim()||!newEmoji||!newColor)?"not-allowed":"pointer",opacity:(!newLabel.trim()||!newEmoji||!newColor)?0.4:1}}>+ Add Category</button>
        </div>

      </div>
    </div>
  );
}

// ── MONTH VIEW ────────────────────────────────────────────────────────────────
function MonthView({baseTasks,cats,viewDate,today,onDayClick,onTaskClick}){
  const winStart=new Date(viewDate.getFullYear(),viewDate.getMonth(),1);
  const winEnd=new Date(viewDate.getFullYear(),viewDate.getMonth()+1,0);
  const allTasks=[
    ...baseTasks.filter(t=>!t.repeat&&urgency(t.deadline)!=="overdue"),
    ...baseTasks.filter(t=>t.repeat).flatMap(t=>expandRepeating(t,winStart,winEnd))
  ];
  const first=new Date(viewDate.getFullYear(),viewDate.getMonth(),1);
  const last=new Date(viewDate.getFullYear(),viewDate.getMonth()+1,0);
  const pad=(first.getDay()+6)%7; // Monday-first offset
  const cells=[];
  for(let i=0;i<pad;i++) cells.push(null);
  for(let d=1;d<=last.getDate();d++) cells.push(new Date(viewDate.getFullYear(),viewDate.getMonth(),d));
  const onDay=d=>allTasks.filter(t=>sameDay(new Date(t.deadline),d));
  const monthTasks=allTasks.filter(t=>new Date(t.deadline).getMonth()===viewDate.getMonth()&&new Date(t.deadline).getFullYear()===viewDate.getFullYear()).sort((a,b)=>a.deadline-b.deadline);
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:2}}>
        {["M","T","W","T","F","S","S"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:10,fontWeight:700,color:"#444",fontFamily:"monospace",padding:"4px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map((day,i)=>{
          if(!day) return <div key={`e${i}`} style={{aspectRatio:"1"}}/>;
          const dt=onDay(day);
          const isToday=sameDay(day,today);
          const isPast=startOf(day)<startOf(today);
          const hasUrg=dt.some(t=>urgency(t.deadline)==="urgent");
          const dots=dt.slice(0,3).map(t=>{const u=urgency(t.deadline);return urgencyColor(u)||(cats[t.category]?.color||"#888");});
          return(
            <div key={day.toISOString()} onClick={()=>onDayClick(day)}
              style={{aspectRatio:"1",background:isToday?"#1a1a2e":"#111",border:`1.5px solid ${isToday?"#4466ff":hasUrg?"#ff950044":"#1e1e1e"}`,borderRadius:6,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-start",padding:"3px 2px",cursor:"pointer",opacity:isPast&&dt.length===0?.3:1,overflow:"hidden"}}>
              <div style={{fontSize:11,fontWeight:isToday?900:500,color:isToday?"#7788ff":isPast?"#444":"#aaa",lineHeight:1.4}}>{day.getDate()}</div>
              <div style={{display:"flex",gap:2,marginTop:1,flexWrap:"wrap",justifyContent:"center"}}>
                {dots.map((c,di)=><div key={di} style={{width:5,height:5,borderRadius:"50%",background:c}}/>)}
                {dt.length>3&&<div style={{width:5,height:5,borderRadius:"50%",background:"#444"}}/>}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{marginTop:14}}>
        {monthTasks.map(t=>{
          const cat=cats[t.category]||{label:t.category,emoji:"•",color:"#888"};
          const u=urgency(t.deadline);
          const lc=urgencyColor(u)||cat.color;
          const tm=fmtTime(t.deadline,t.noTime);
          const rl=repeatLabel(t.repeat);
          return(
            <div key={t.id} onClick={()=>onTaskClick(t)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:"#111",borderRadius:8,marginBottom:5,cursor:"pointer",borderLeft:`3px solid ${lc}`}}>
              <span style={{fontSize:14}}>{cat.emoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:13,fontWeight:700,color:"#f0f0f0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.title}</div>
                <div style={{fontSize:10,color:urgencyColor(u)||"#555",fontFamily:"monospace"}}>{new Date(t.deadline).toLocaleDateString("en-US",{month:"short",day:"numeric"})}{tm?` · ${tm}`:""} · {fmtCountdown(t.deadline)}{rl?" · 🔁":""}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── WEEK VIEW ─────────────────────────────────────────────────────────────────
function WeekView({baseTasks,cats,viewDate,today,onDayClick,onTaskClick}){
  const mondayOff=d=>(d.getDay()+6)%7;
  const [numDays,setNumDays]=useState(14);
  const [pastExpanded,setPastExpanded]=useState(false);

  // Start from 7 days ago (past week), show today onwards infinitely
  const weekStart=new Date(today);
  weekStart.setDate(today.getDate()-7);
  weekStart.setHours(0,0,0,0);

  const handleScroll=e=>{
    const el=e.currentTarget;
    if(el.scrollHeight-el.scrollTop-el.clientHeight<200) setNumDays(n=>n+7);
  };

  const futureDays=Array.from({length:numDays},(_,i)=>addDays(today,i));
  const pastDays=Array.from({length:7},(_,i)=>addDays(weekStart,i)); // 7 days before today

  const allTasksWindow=[
    ...baseTasks.filter(t=>!t.repeat&&urgency(t.deadline)!=="overdue"),
    ...baseTasks.filter(t=>t.repeat).flatMap(t=>expandRepeating(t,weekStart,addDays(today,numDays)))
      .filter(occ=>{
        const occDay=new Date(occ.deadline);occDay.setHours(0,0,0,0);
        const occDayStart=occDay.getTime();
        const occDayEnd=occDayStart+86400000-1;
        const completed=(completionLog||[]).some(l=>l.taskId===occ.id);
        return !completed;
      })
  ];

  const renderDay=(day,isPast)=>{
    const dt=allTasksWindow.filter(t=>sameDay(new Date(t.deadline),day)).sort((a,b)=>a.deadline-b.deadline);
    const isToday=sameDay(day,today);
    const dayName=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"][(day.getDay()+6)%7];
    return(
      <div key={day.toISOString()} style={{background:isToday?"#1a1a2e":"#111",border:`1.5px solid ${isToday?"#4466ff":"#1e1e1e"}`,borderRadius:10,padding:"10px 12px",opacity:isPast?.6:1}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:dt.length?8:0}}>
          <div style={{fontSize:10,fontWeight:700,color:isToday?"#7788ff":"#444",fontFamily:"monospace",letterSpacing:".06em",textTransform:"uppercase",minWidth:28}}>{dayName}</div>
          <div style={{fontSize:14,fontWeight:isToday?900:600,color:isToday?"#aabbff":isPast?"#555":"#888"}}>{MON_NAMES[day.getMonth()].slice(0,3)} {day.getDate()}</div>
          {!isPast&&<button onClick={()=>onDayClick(day)} style={{marginLeft:"auto",background:"transparent",border:"1px solid #2a2a2a",borderRadius:6,padding:"3px 8px",color:"#444",fontSize:11,cursor:"pointer"}}>+ Add</button>}
        </div>
        {dt.map(t=><TaskRow key={t.id} task={t} cats={cats} onClick={()=>onTaskClick(t)}/>)}
        {dt.length===0&&!isPast&&<div style={{fontSize:11,color:"#2a2a2a",fontStyle:"italic"}}>Nothing here yet.</div>}
      </div>
    );
  };

  return(
    <div onScroll={handleScroll} style={{height:"calc(100vh - 160px)",overflowY:"auto",paddingBottom:20}}>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>

        {/* Collapsed past week */}
        <div onClick={()=>setPastExpanded(p=>!p)}
          style={{background:"#0e0e0e",border:"1.5px solid #1a1a1a",borderRadius:10,padding:"10px 14px",cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,fontWeight:700,color:"#444",fontFamily:"monospace",letterSpacing:".06em",textTransform:"uppercase"}}>
            {pastExpanded?"▲":"▼"} Past 7 days
          </span>
          {!pastExpanded&&(()=>{
            const pastMissed=pastDays.reduce((acc,d)=>acc+allTasksWindow.filter(t=>sameDay(new Date(t.deadline),d)).length,0);
            return pastMissed>0?<span style={{fontSize:11,color:"#ff6b6b",fontFamily:"monospace"}}>{pastMissed} task{pastMissed!==1?"s":""}</span>:null;
          })()}
        </div>
        {pastExpanded&&pastDays.map(d=>renderDay(d,true))}

        {/* Today and future */}
        {futureDays.map(d=>renderDay(d,false))}
        <div style={{textAlign:"center",padding:"16px 0",color:"#2a2a2a",fontSize:12,fontFamily:"monospace"}}>↓ scroll for more</div>
      </div>
    </div>
  );
}

// ── MISSED TAB ────────────────────────────────────────────────────────────────
function MissedTab({tasks,cats,onReschedule,onDelete}){
  const missed=tasks.filter(t=>!t.repeat&&urgency(t.deadline)==="overdue").sort((a,b)=>b.deadline-a.deadline);
  const [rescheduleTask,setRescheduleTask]=useState(null);
  const rescheduleToTomorrow=(id)=>{
    const tomorrow=addDays(new Date(),1);
    tomorrow.setHours(9,0,0,0);
    onReschedule(id,tomorrow.getTime());
  };
  if(rescheduleTask) return <RescheduleModal task={rescheduleTask} onReschedule={onReschedule} onClose={()=>setRescheduleTask(null)}/>;
  return(
    <div style={{padding:"14px 16px 0",maxWidth:560,margin:"0 auto"}}>

          <div style={{fontSize:13,color:"#333",marginTop:4}}>Keep it that way.</div>
        </div>
      ):missed.map(t=>{
        const cat=cats[t.category]||{label:t.category,emoji:"•",color:"#888"};

              <span>{cat.emoji}</span>
              <span style={{fontSize:11,fontWeight:700,color:cat.color,fontFamily:"monospace",textTransform:"uppercase",letterSpacing:".06em"}}>{cat.label}</span>
              <span style={{marginLeft:"auto",fontSize:11,fontFamily:"monospace",color:"#ff6b6b"}}>{fmtCountdown(t.deadline)}</span>
            </div>
            <div style={{fontSize:15,fontWeight:800,color:"#f0f0f0",marginBottom:4}}>{t.title}</div>
            <div style={{fontSize:11,color:"#444",fontFamily:"monospace",marginBottom:12}}>Was due {new Date(t.deadline).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}{tm?` at ${tm}`:""}</div>
            <div style={{display:"flex",gap:8}}>

      })}

// ── STATS TAB ─────────────────────────────────────────────────────────────────
function StatsTab({tasks,cats,completionLog}){
  const repeating=tasks.filter(t=>t.repeat);
  const [graphTask,setGraphTask]=useState(null);
  const [graphMode,setGraphMode]=useState("bar"); // bar | line

  // Overall completion rate by week (last 8 weeks)
  function getWeeklyRate(){
    const weeks=[];
    const now=new Date();
    for(let w=7;w>=0;w--){
      const wEnd=new Date(now); wEnd.setDate(now.getDate()-w*7); wEnd.setHours(23,59,59,999);
      const wStart=new Date(wEnd); wStart.setDate(wEnd.getDate()-6); wStart.setHours(0,0,0,0);
      let possible=0,done=0;
      repeating.forEach(t=>{
        const occ=expandRepeating(t,wStart,wEnd).filter(o=>o.deadline<=wEnd.getTime()&&o.deadline>=wStart.getTime());
        possible+=occ.length;
        done+=completionLog.filter(l=>l.taskId===t.id&&l.at>=wStart.getTime()&&l.at<=wEnd.getTime()).length;
      });
      const label=`${MON_NAMES[wStart.getMonth()].slice(0,3)} ${wStart.getDate()}`;
      weeks.push({label,rate:possible===0?null:Math.round((done/possible)*100),done,possible});
    }
    return weeks;
  }

  // Bar chart data for a single task (completions per week, last 8 weeks)
  function getTaskBars(task){
    const bars=[];
    const now=new Date();
    for(let w=7;w>=0;w--){
      const wEnd=new Date(now); wEnd.setDate(now.getDate()-w*7); wEnd.setHours(23,59,59,999);
      const wStart=new Date(wEnd); wStart.setDate(wEnd.getDate()-6); wStart.setHours(0,0,0,0);
      const occ=expandRepeating(task,wStart,wEnd).filter(o=>o.deadline<=wEnd.getTime()&&o.deadline>=wStart.getTime());
      const done=completionLog.filter(l=>l.taskId===task.id&&l.at>=wStart.getTime()&&l.at<=wEnd.getTime()).length;
      const label=`${MON_NAMES[wStart.getMonth()].slice(0,3)} ${wStart.getDate()}`;
      bars.push({label,done,possible:occ.length});
    }
    return bars;
  }

  // Mini SVG bar chart
  function BarChart({data,color}){
    const max=Math.max(...data.map(d=>d.possible),1);
    const W=300,H=80,gap=4;
    const bw=(W-(data.length-1)*gap)/data.length;
    return(
      <svg viewBox={`0 0 ${W} ${H+30}`} style={{width:"100%",maxWidth:340}}>
        {data.map((d,i)=>{
          const doneH=d.possible===0?0:(d.done/max)*H;
          const possH=(d.possible/max)*H;
          const x=i*(bw+gap);
          return(
            <g key={i}>
              <rect x={x} y={H-possH} width={bw} height={possH} fill="#222" rx={2}/>
              <rect x={x} y={H-doneH} width={bw} height={doneH} fill={color} rx={2} opacity={0.9}/>
              <text x={x+bw/2} y={H+12} textAnchor="middle" fill="#444" fontSize={7} fontFamily="monospace">{d.label}</text>
              {d.possible>0&&<text x={x+bw/2} y={H-possH-3} textAnchor="middle" fill="#666" fontSize={7}>{d.done}/{d.possible}</text>}
            </g>
          );
        })}
      </svg>
    );
  }

  // Mini SVG line chart
  function LineChart({data,color}){
    const valid=data.filter(d=>d.rate!==null);
    if(valid.length<2) return <div style={{color:"#444",fontSize:12,fontStyle:"italic",padding:"20px 0"}}>Not enough data yet.</div>;
    const W=300,H=80,gap=4;
    const xs=data.map((_,i)=>i*(W/(data.length-1)));
    const ys=data.map(d=>d.rate===null?null:H-(d.rate/100)*H);
    const points=xs.map((x,i)=>ys[i]===null?null:{x,y:ys[i]});
    // build path skipping nulls
    let path="";
    points.forEach((p,i)=>{
      if(!p) return;
      path+=(path===""||points[i-1]===null)?`M${p.x},${p.y}`:`L${p.x},${p.y}`;
    });
    return(
      <svg viewBox={`0 0 ${W} ${H+30}`} style={{width:"100%",maxWidth:340}}>
        {/* grid lines */}
        {[0,25,50,75,100].map(v=>(
          <line key={v} x1={0} y1={H-(v/100)*H} x2={W} y2={H-(v/100)*H} stroke="#1e1e1e" strokeWidth={1}/>
        ))}
        {[0,25,50,75,100].map(v=>(
          <text key={`l${v}`} x={0} y={H-(v/100)*H-2} fill="#333" fontSize={7} fontFamily="monospace">{v}%</text>
        ))}
        <path d={path} fill="none" stroke={color} strokeWidth={2} strokeLinejoin="round" strokeLinecap="round"/>
        {points.map((p,i)=>p&&(
          <circle key={i} cx={p.x} cy={p.y} r={3} fill={color}/>
        ))}
        {data.map((d,i)=>(
          <text key={i} x={xs[i]} y={H+12} textAnchor="middle" fill="#444" fontSize={7} fontFamily="monospace">{d.label}</text>
        ))}
        {points.map((p,i)=>p&&data[i].rate!==null&&(
          <text key={`v${i}`} x={p.x} y={p.y-6} textAnchor="middle" fill="#666" fontSize={7}>{data[i].rate}%</text>
        ))}
      </svg>
    );
  }

  if(repeating.length===0){
    return(
      <div style={{textAlign:"center",padding:"60px 20px",color:"#333",maxWidth:560,margin:"0 auto"}}>
        <div style={{fontSize:36,marginBottom:12}}>📊</div>
        <div style={{fontSize:16,fontWeight:700,color:"#444"}}>No repeating tasks yet.</div>
        <div style={{fontSize:13,color:"#333",marginTop:4}}>Add a repeating task to track your ratio.</div>
      </div>
    );
  }

  const weeklyRate=getWeeklyRate();

  return(
    <div style={{padding:"14px 16px 0",maxWidth:560,margin:"0 auto"}}>

      {/* Overall line chart */}
      <div style={{background:"#111",border:"1.5px solid #1e1e1e",borderRadius:10,padding:"14px",marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:800,color:"#f0f0f0",marginBottom:2}}>Overall Completion Rate</div>
        <div style={{fontSize:11,color:"#444",fontFamily:"monospace",marginBottom:12}}>Last 8 weeks · all repeating tasks</div>
        <LineChart data={weeklyRate} color="#4ECDC4"/>
      </div>

      {/* Per-task section */}
      <div style={{fontSize:11,fontWeight:700,color:"#444",fontFamily:"monospace",letterSpacing:".1em",textTransform:"uppercase",marginBottom:10}}>Per Task</div>

      {/* Graph mode toggle */}
      <div style={{display:"flex",background:"#1a1a1a",borderRadius:7,padding:2,gap:2,marginBottom:14,alignSelf:"flex-start",width:"fit-content"}}>
        {[["bar","Bar"],["line","Line"]].map(([k,l])=>(
          <button key={k} onClick={()=>setGraphMode(k)} style={{background:graphMode===k?"#f0f0f0":"transparent",color:graphMode===k?"#000":"#555",border:"none",borderRadius:5,padding:"4px 14px",fontWeight:700,fontSize:12,cursor:"pointer"}}>{l}</button>
        ))}
      </div>

      {repeating.map(t=>{
        const cat=cats[t.category]||{label:t.category,emoji:"•",color:"#888"};
        const logs=completionLog.filter(l=>l.taskId===t.id);
        const completed=logs.length;
        const total=countOccurrencesSince(t,t.deadline);
        const ratio=total===0?0:Math.round((completed/total)*100);
        const barColor=ratio>=80?cat.color:ratio>=50?"#ffd60a":"#ff3b3b";
        const rl=repeatLabel(t.repeat);
        const isOpen=graphTask===t.id;
        const chartData=graphMode==="bar"?getTaskBars(t):getWeeklyRate().map((w,i)=>{
          // per-task weekly rate
          const now2=new Date();
          const wEnd=new Date(now2);wEnd.setDate(now2.getDate()-(7-i)*7);wEnd.setHours(23,59,59,999);
          const wStart=new Date(wEnd);wStart.setDate(wEnd.getDate()-6);wStart.setHours(0,0,0,0);
          const occ=expandRepeating(t,wStart,wEnd).filter(o=>o.deadline<=wEnd.getTime()&&o.deadline>=wStart.getTime());
          const done=completionLog.filter(l=>l.taskId===t.id&&l.at>=wStart.getTime()&&l.at<=wEnd.getTime()).length;
          return{...w,rate:occ.length===0?null:Math.round((done/occ.length)*100),done,possible:occ.length};
        });

        return(
          <div key={t.id} style={{background:"#111",border:`1.5px solid ${cat.color}22`,borderRadius:10,padding:"14px",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
              <span style={{fontSize:16}}>{cat.emoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:800,color:"#f0f0f0",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.title}</div>
                <div style={{fontSize:10,color:"#555",fontFamily:"monospace"}}>{rl}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:22,fontWeight:900,color:barColor}}>{ratio}%</div>
                <div style={{fontSize:10,color:"#444",fontFamily:"monospace"}}>{completed}/{total}</div>
              </div>
            </div>
            {/* ratio bar */}
            <div style={{background:"#1a1a1a",borderRadius:4,height:6,overflow:"hidden",marginBottom:6}}>
              <div style={{background:barColor,height:"100%",width:`${ratio}%`,borderRadius:4}}/>
            </div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontSize:11,color:"#444",fontStyle:"italic"}}>
                {ratio===100?"Perfect. Keep it up.":ratio>=80?"Solid. Don't slip now.":ratio>=50?"Room to improve.":total===0?"No occurrences yet.":"You're missing too many of these."}
              </div>
              <button onClick={()=>setGraphTask(isOpen?null:t.id)} style={{background:"transparent",border:"1px solid #2a2a2a",borderRadius:6,padding:"3px 10px",color:"#555",fontSize:11,cursor:"pointer",whiteSpace:"nowrap",marginLeft:8}}>
                {isOpen?"Hide graph":"See graph"}
              </button>
            </div>
            {isOpen&&(
              <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid #1a1a1a"}}>
                <div style={{fontSize:11,color:"#555",fontFamily:"monospace",marginBottom:8}}>COMPLETIONS · LAST 8 WEEKS</div>
                {graphMode==="bar"
                  ?<BarChart data={chartData} color={cat.color}/>
                  :<LineChart data={chartData} color={cat.color}/>
                }
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

      const gP=Math.sin(Math.min(progress,0.78)*Math.PI/0.78);
      const g2=ctx.createRadialGradient(cx,cy,0,cx,cy,240);
      g2.addColorStop(0,`rgba(190,115,10,${gP*0.22})`);g2.addColorStop(0.25,`rgba(165,95,8,${gP*0.12})`);g2.addColorStop(0.65,`rgba(140,75,5,${gP*0.04})`);g2.addColorStop(1,"rgba(0,0,0,0)");
      ctx.beginPath();ctx.arc(cx,cy,240,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();
      const g1=ctx.createRadialGradient(cx,cy,0,cx,cy,65);
      g1.addColorStop(0,`rgba(255,210,80,${gP*0.7})`);g1.addColorStop(0.4,`rgba(230,160,30,${gP*0.35})`);g1.addColorStop(1,"rgba(0,0,0,0)");
      ctx.beginPath();ctx.arc(cx,cy,65,0,Math.PI*2);ctx.fillStyle=g1;ctx.fill();
    }
    CRACKS.forEach(crack=>{
      const p=Math.max(0,Math.min(1,(progress-crack.delay)/(1-crack.delay)));
      if(p<=0) return;
      const alpha=Math.min(1,p*6)*(1-fadeOut);
      if(alpha<=0) return;
      const pts=crack.pts;
      const totalLen=pts.slice(1).reduce((acc,pt,j)=>acc+Math.hypot(pt[0]-pts[j][0],pt[1]-pts[j][1]),0);
      let rem=p*totalLen; const vis=[pts[0]];
      for(let j=1;j<pts.length;j++){
        const seg=Math.hypot(pts[j][0]-pts[j-1][0],pts[j][1]-pts[j-1][1]);
        if(rem<=0) break;
        if(rem>=seg){vis.push(pts[j]);rem-=seg;}
        else{const t=rem/seg;vis.push([pts[j-1][0]+(pts[j][0]-pts[j-1][0])*t,pts[j-1][1]+(pts[j][1]-pts[j-1][1])*t]);rem=0;}
      }
      if(vis.length<2) return;
      const [r,g,b]=crack.color;
      const cC=a=>`rgba(${r},${g},${b},${alpha*a})`;
      const mC=a=>`rgba(${Math.floor(r*0.82)},${Math.floor(g*0.72)},${Math.floor(b*0.6)},${alpha*a})`;
      const oC=a=>`rgba(${Math.floor(r*0.62)},${Math.floor(g*0.52)},${Math.floor(b*0.4)},${alpha*a})`;
      [{w:crack.baseW*16,c:oC(0.04)},{w:crack.baseW*10,c:oC(0.08)},{w:crack.baseW*6,c:mC(0.16)},{w:crack.baseW*3,c:mC(0.32)},{w:crack.baseW*1.5,c:cC(0.65)},{w:crack.baseW,c:cC(1.0)},{w:crack.baseW*0.4,c:`rgba(255,240,180,${alpha*0.7})`}].forEach(layer=>{
        ctx.beginPath();ctx.moveTo(vis[0][0],vis[0][1]);
        for(let j=1;j<vis.length;j++) ctx.lineTo(vis[j][0],vis[j][1]);
        ctx.strokeStyle=layer.c;ctx.lineWidth=layer.w;ctx.lineCap="round";ctx.lineJoin="round";ctx.stroke();
      });
    });
    PARTICLES.current.forEach(p=>{
      const pP=Math.max(0,Math.min(1,(progress-p.delay)/(0.8-p.delay)));
      if(pP<=0) return;
      const age=pP*p.life; if(age<=0||age>=p.life) return;
      const lifeAlpha=Math.sin((age/p.life)*Math.PI);
      const alpha=lifeAlpha*(1-fadeOut)*0.85; if(alpha<=0) return;
      const x=p.x+p.vx*pP*60,y=p.y+p.vy*pP*60+0.5*0.6*(pP*60)*(pP*60)*0.05;
      const size=p.size*(1-pP*0.4);
      const grad=ctx.createRadialGradient(x,y,0,x,y,size*3);
      grad.addColorStop(0,`rgba(${p.r},${p.g},${p.b},${alpha})`);grad.addColorStop(1,"rgba(0,0,0,0)");
      ctx.beginPath();ctx.arc(x,y,size*3,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
      ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fillStyle=`rgba(255,220,120,${alpha*0.9})`;ctx.fill();
    });
    if(progress<0.12){
      const fa=Math.max(0,(0.12-progress)/0.12*0.35);
      ctx.fillStyle=`rgba(255,230,140,${fa})`;ctx.fillRect(0,0,w,h);
    }
  },[progress,cx,cy,w,h]);
  return React.createElement("canvas",{ref:canvasRef,width:w,height:h,style:{position:"absolute",inset:0,width:"100%",height:"100%",pointerEvents:"none"}});
}

// ── SPLASH LOGO ───────────────────────────────────────────────────────────────
function SplashLogo({size=88,glow=0}){
  const g=Math.max(0,Math.min(1,glow));
  return React.createElement("div",{style:{width:size,height:size,borderRadius:size*0.22,background:"#000",border:`1.5px solid rgba(232,160,32,${0.2+g*0.8})`,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:g>0?[`0 0 ${g*110}px rgba(180,100,8,${g*0.8})`,`0 0 ${g*55}px rgba(220,150,20,${g*0.65})`,`0 0 ${g*22}px rgba(255,200,70,${g*0.55})`,`inset 0 0 ${g*28}px rgba(220,150,20,${g*0.2})`].join(","):"none"}},
    React.createElement("span",{style:{fontSize:size*0.6,fontWeight:900,color:"#fff",fontFamily:"-apple-system,'Helvetica Neue',sans-serif",lineHeight:1,userSelect:"none",marginTop:size*0.04,textShadow:g>0?`0 0 ${g*32}px rgba(255,200,70,${g*0.95})`:"none"}},"P")
  );
}

// ── SPLASH SCREEN ─────────────────────────────────────────────────────────────
function SplashScreen({onDone,ready}){
  const [phase,setPhase]=useState("idle");
  const [progress,setProgress]=useState(0);
  const rafRef=React.useRef(null);
  const startedRef=React.useRef(false);
  const [dims,setDims]=useState({w:390,h:844});
  useEffect(()=>{
    const upd=()=>setDims({w:window.innerWidth,h:window.innerHeight});
    upd();window.addEventListener("resize",upd);return()=>window.removeEventListener("resize",upd);
  },[]);
  useEffect(()=>{
    if(!ready||startedRef.current) return;
    startedRef.current=true;
    const t=setTimeout(()=>{
      setPhase("lightning");
      const t0=performance.now();
      const tick=now=>{
        const raw=Math.min(1,(now-t0)/1050);
        setProgress(1-(1-raw)**3);
        if(raw<1){rafRef.current=requestAnimationFrame(tick);}
        else{setPhase("hold");setTimeout(()=>{setPhase("out");setTimeout(onDone,500);},420);}
      };
      rafRef.current=requestAnimationFrame(tick);
    },120);
    return()=>{clearTimeout(t);cancelAnimationFrame(rafRef.current);};
  },[ready]);
  const logoCY=dims.h*0.32,logoCX=dims.w*0.5,logoSize=88;
  const glow=phase==="lightning"?Math.sin(Math.min(progress,0.78)*Math.PI/0.78):phase==="hold"?0.45:0;
  return(
    <div style={{position:"fixed",inset:0,background:"#000",zIndex:1000,opacity:phase==="out"?0:1,transition:phase==="out"?"opacity 0.5s ease":"none"}}>
      {(phase==="lightning"||phase==="hold")&&React.createElement(ShatterCanvas,{progress,cx:logoCX,cy:logoCY,w:dims.w,h:dims.h})}
      <div style={{position:"absolute",left:"50%",top:logoCY,transform:"translate(-50%,-50%)",zIndex:2,opacity:phase==="idle"?0:1,transition:"opacity 0.3s ease"}}>
        {React.createElement(SplashLogo,{size:logoSize,glow})}
      </div>
    </div>
  );
}


function App(){
  const today=new Date();today.setHours(0,0,0,0);
  const [showSplash,setShowSplash]=useState(()=>{
    try{
      if(sessionStorage.getItem("splashShown")) return false;
      sessionStorage.setItem("splashShown","1");
      return true;
    }catch{return false;}
  });
  const [staggerIn,setStaggerIn]=useState(()=>{try{return !!sessionStorage.getItem('splashShown');}catch{return false;}});
  const [appReady,setAppReady]=useState(false);
  const [cats,setCats]=useState(()=>{try{const s=localStorage.getItem("p-cats");return s?JSON.parse(s):DEFAULT_CATS;}catch{return DEFAULT_CATS;}});
  const [tasks,setTasks]=useState(()=>{try{const s=localStorage.getItem("p-tasks");return s?JSON.parse(s):[];}catch{return [];}});
  const [completionLog,setCompletionLog]=useState(()=>{try{const s=localStorage.getItem("p-log");return s?JSON.parse(s):[];}catch{return [];}});
  const [tab,setTab]=useState("calendar"); // calendar | missed | stats
  const [view,setView]=useState("week");
  const [viewDate,setViewDate]=useState(new Date());
  const [addModal,setAddModal]=useState(null);
  const [selTask,setSelTask]=useState(null);
  const [showCats,setShowCats]=useState(false);
  const [flash,setFlash]=useState(null);
  const [showChangelog,setShowChangelog]=useState(false);
  const [doneCount,setDoneCount]=useState(()=>{try{return parseInt(localStorage.getItem("p-done")||"0");}catch{return 0;}});

  useEffect(()=>{setAppReady(true);},[]);
  useEffect(()=>{
    if(!showSplash) setTimeout(()=>setStaggerIn(true),80);
  },[showSplash]);
  useEffect(()=>{try{localStorage.setItem("p-cats",JSON.stringify(cats));}catch{}},[cats]);
  useEffect(()=>{try{localStorage.setItem("p-tasks",JSON.stringify(tasks));}catch{}},[tasks]);
  useEffect(()=>{try{localStorage.setItem("p-log",JSON.stringify(completionLog));}catch{}},[completionLog]);
  useEffect(()=>{try{localStorage.setItem("p-done",String(doneCount));}catch{}},[doneCount]);

  const complete=id=>{
    const isVirtual=typeof id==="string"&&id.includes("_");
    const parentId=isVirtual?parseInt(id.split("_")[0]):id;
    const t=tasks.find(x=>x.id===parentId||x.id===id);
    if(!t) return;
    const color=(cats[t.category]||{color:"#4ECDC4"}).color;
    setDoneCount(c=>c+1);
    setSelTask(null);
    setFlash({msg:pick(HYPE.complete),color});
    if(t.repeat){
      // log this completion
      setCompletionLog(l=>[...l,{taskId:t.id,at:Date.now()}]);
    } else {
      setTasks(p=>p.filter(x=>x.id!==parentId&&x.id!==id));
    }
  };
  const del=id=>{
    const parentId=typeof id==="string"&&id.includes("_")?parseInt(id.split("_")[0]):id;
    setTasks(p=>p.filter(x=>x.id!==parentId&&x.id!==id));
    setSelTask(null);
  };
  const add=t=>setTasks(p=>[...p,{...t,id:Date.now()}]);
  const skipOne=id=>{
    // id is a virtual id like "5_1234567" — extract the deadline timestamp
    const isVirtual=typeof id==="string"&&id.includes("_");
    if(!isVirtual){setSelTask(null);return;}
    const parts=id.split("_");
    const parentId=parseInt(parts[0]);
    const occTs=parseInt(parts[1]);
    setTasks(p=>p.map(x=>x.id===parentId?{...x,skipped:[...(x.skipped||[]),occTs]}:x));
    setSelTask(null);
  };
  const reschedule=(id,newDl)=>{
    const parentId=typeof id==="string"&&id.includes("_")?parseInt(id.split("_")[0]):id;
    setTasks(p=>p.map(x=>x.id===parentId||x.id===id?{...x,deadline:newDl}:x));
    setSelTask(null);
  };

  const navPrev=()=>{const d=new Date(viewDate);view==="month"?d.setMonth(d.getMonth()-1):d.setDate(d.getDate()-7);setViewDate(d);};
  const navNext=()=>{const d=new Date(viewDate);view==="month"?d.setMonth(d.getMonth()+1):d.setDate(d.getDate()+7);setViewDate(d);};
  const mondayOffset=d=>(d.getDay()+6)%7;
  const ws=new Date(viewDate);ws.setDate(viewDate.getDate()-mondayOffset(viewDate));
  const we=addDays(ws,6);
  const wlabel=ws.getMonth()===we.getMonth()?`${MON_NAMES[ws.getMonth()]} ${ws.getDate()}–${we.getDate()}`:`${MON_NAMES[ws.getMonth()].slice(0,3)} ${ws.getDate()} – ${MON_NAMES[we.getMonth()].slice(0,3)} ${we.getDate()}`;

  const missedCount=tasks.filter(t=>!t.repeat&&urgency(t.deadline)==="overdue").length;
  const resolvedSelTask=selTask?tasks.find(x=>x.id===selTask.id)||selTask:null;

  return(
    <div style={{minHeight:"100vh",background:"#0c0c0c",color:"#f0f0f0",paddingBottom:80}}>
      {showSplash&&React.createElement(SplashScreen,{onDone:()=>{setShowSplash(false);},ready:appReady})}
      {/* STAGGER WRAPPER */}
      <div style={{opacity:staggerIn?1:0,transform:staggerIn?"translateY(0)":"translateY(12px)",transition:"opacity 0.5s ease, transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94)"}}>
      {/* HEADER */}
      <div style={{padding:"50px 16px 0 16px",position:"sticky",top:0,background:"#0c0c0c",zIndex:10,borderBottom:"1px solid #1a1a1a",paddingBottom:0}}>
        <div style={{maxWidth:560,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {tab==="calendar"&&<button onClick={()=>setAddModal(new Date())} style={{background:"#f0f0f0",color:"#000",border:"none",borderRadius:8,padding:"7px 14px",fontWeight:800,fontSize:13,cursor:"pointer"}}>+ Add</button>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {doneCount>0&&<div><span style={{fontSize:18,fontWeight:900,color:"#4ECDC4"}}>{doneCount}</span><span style={{fontSize:10,color:"#444",fontFamily:"monospace",marginLeft:3}}>DONE</span></div>}
              <div style={{fontSize:10,fontWeight:700,color:"#444",fontFamily:"monospace",letterSpacing:".1em",textTransform:"uppercase"}}>
                {tab==="calendar"?"Your calendar":tab==="missed"?"Missed":tab==="stats"?"Stats":"Settings"}
              {tab==="calendar"&&<div onClick={()=>setShowChangelog(true)} style={{fontSize:9,color:"#333",fontFamily:"monospace",letterSpacing:".04em",marginTop:1,cursor:"pointer"}}>{VERSION}</div>}
              </div>
            </div>
          </div>
          {/* Tab bar */}
          <div style={{display:"flex",gap:0,borderBottom:"1px solid #1a1a1a"}}>
            {[["calendar","📅 Calendar"],["missed",`⚠️ Missed${missedCount>0?` (${missedCount})`:``}`],["stats","📊 Stats"],["settings","⚙️"]].map(([key,label])=>(
              <button key={key} onClick={()=>setTab(key)} style={{flex:1,background:"transparent",border:"none",borderBottom:`2px solid ${tab===key?"#f0f0f0":"transparent"}`,color:tab===key?"#f0f0f0":"#555",padding:"10px 4px",fontSize:12,fontWeight:700,cursor:"pointer",transition:"color .15s"}}>{label}</button>
            ))}
          </div>

          {/* Calendar sub-controls */}
          {tab==="calendar"&&(
            <div style={{display:"flex",alignItems:"center",gap:6,padding:"10px 0 10px"}}>
              <div style={{display:"flex",background:"#1a1a1a",borderRadius:7,padding:2,gap:2}}>
                {["week","month"].map(v=>(
                  <button key={v} onClick={()=>setView(v)} style={{background:view===v?"#f0f0f0":"transparent",color:view===v?"#000":"#555",border:"none",borderRadius:5,padding:"4px 12px",fontWeight:700,fontSize:12,cursor:"pointer",textTransform:"capitalize"}}>{v}</button>
                ))}
              </div>
              {view==="month"&&<button onClick={navPrev} style={{background:"transparent",border:"1px solid #2a2a2a",borderRadius:6,padding:"4px 9px",color:"#777",fontSize:14,cursor:"pointer"}}>‹</button>}
              {view==="month"&&<button onClick={navNext} style={{background:"transparent",border:"1px solid #2a2a2a",borderRadius:6,padding:"4px 9px",color:"#777",fontSize:14,cursor:"pointer"}}>›</button>}
              <span style={{fontSize:13,fontWeight:700,color:"#aaa",flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                {view==="month"?`${MON_NAMES[viewDate.getMonth()]} ${viewDate.getFullYear()}`:"This week & beyond"}
              </span>
              <button onClick={()=>setViewDate(new Date())} style={{background:"transparent",border:"1px solid #2a2a2a",borderRadius:6,padding:"4px 10px",color:"#666",fontSize:11,cursor:"pointer",whiteSpace:"nowrap"}}>Today</button>
            </div>
          )}
        </div>
      </div>

      {/* BODY */}
      {tab==="calendar"&&(
        <div style={{maxWidth:560,margin:"0 auto",padding:"14px 16px 0"}}>
          {view==="month"
            ?<MonthView baseTasks={tasks} cats={cats} viewDate={viewDate} today={today} onDayClick={d=>setAddModal(d)} onTaskClick={setSelTask}/>
            :<WeekView  baseTasks={tasks} cats={cats} viewDate={viewDate} today={today} onDayClick={d=>setAddModal(d)} onTaskClick={setSelTask}/>
          }
        </div>
      )}
      {tab==="missed"&&<MissedTab tasks={tasks} cats={cats} onReschedule={reschedule} onDelete={del}/>}
      {tab==="stats"&&<StatsTab tasks={tasks} cats={cats} completionLog={completionLog}/>}
      {tab==="settings"&&<SettingsTab cats={cats} setCats={setCats} tasks={tasks} completionLog={completionLog} doneCount={doneCount}/>}

      {addModal&&<AddModal defaultDate={addModal} cats={cats} onAdd={add} onClose={()=>setAddModal(null)}/>}
      {resolvedSelTask&&<TaskModal task={resolvedSelTask} cats={cats} onComplete={complete} onDelete={del} onSkipOne={skipOne} onReschedule={reschedule} onClose={()=>setSelTask(null)}/>}
      {flash&&<Flash msg={flash.msg} color={flash.color} onDone={()=>setFlash(null)}/>}
      {showChangelog&&<ChangelogModal onClose={()=>setShowChangelog(false)}/>}
      </div>{/* end stagger */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
